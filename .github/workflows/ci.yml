name: Push to Main CI

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Prewarm & Install (workspace)
        run: |
          set -euo pipefail
          pnpm fetch
          pnpm install --frozen-lockfile --offline

      - name: Build publishable packages
        run: |
          pnpm -r \
            --filter @meshtastic/sdk \
            --filter @meshtastic/sdk-react \
            --filter @meshtastic/sdk-storage-sqlocal \
            --filter @meshtastic/transport-http \
            --filter @meshtastic/transport-node \
            --filter @meshtastic/transport-node-serial \
            --filter @meshtastic/transport-web-bluetooth \
            --filter @meshtastic/transport-web-serial \
            run build:npm
